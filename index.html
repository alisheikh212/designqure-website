<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>DesignQure | Website Design Agency for Startups &amp; E-commerce Brands</title>
    <meta name="description" content="DesignQure designs high-converting websites, landing pages, portfolio sites, and e-commerce visuals for startups, agencies, and modern brands that need sharper digital presence." />
    <link rel="canonical" href="https://designqurestudio.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="DesignQure | Website Design Agency for Startups &amp; E-commerce Brands" />
    <meta property="og:description" content="DesignQure designs high-converting websites, landing pages, portfolio sites, and e-commerce visuals for startups, agencies, and modern brands." />

    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DesignQure | Website Design Agency for Startups &amp; E-commerce Brands" />
    <meta name="twitter:description" content="DesignQure designs high-converting websites, landing pages, portfolio sites, and e-commerce visuals for startups, agencies, and modern brands." />
  </head>
  <body>
    <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <p hidden>
        <label>Don’t fill this out: <input name="bot-field" /></label>
      </p>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="brand" />
      <input type="text" name="website" />
      <input type="text" name="service" />
      <input type="text" name="budget" />
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
